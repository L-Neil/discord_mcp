name: Build and push image

# Builds a multi-arch (linux/amd64 + linux/arm64) image and pushes it to GHCR.
# OCI Ampere A1 nodes are arm64, x86 nodes are amd64 — one manifest serves both.
#
# Pulls from a private GHCR package need a pull secret in the cluster (the chart
# / k8s manifests have an imagePullSecrets hook for this). Make the package
# public under the repo's Packages settings if you'd rather pull anonymously.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # ghcr.io/<owner>/discord-mcp. docker/metadata-action lowercases this, so it
  # is safe even if the owner has uppercase letters.
  IMAGE_NAME: ${{ github.repository_owner }}/discord-mcp

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        # Enables building the arm64 image on the amd64 runner via emulation.
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Don't log in for PRs from forks (no secrets, and we don't push there).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          # Build only on PRs (validation); push on branch/tag/dispatch events.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Keep the manifest list clean (no extra unknown/unknown provenance
          # entry); flip to true if you want SLSA provenance attestations.
          provenance: false
