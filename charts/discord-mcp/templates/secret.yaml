{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "discord-mcp.secretName" . }}
  labels:
    {{- include "discord-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  DISCORD_BOT_TOKEN: {{ required "secret.botToken is required when secret.create=true" .Values.secret.botToken | quote }}
  DISCORD_GUILD_ID: {{ required "secret.guildId is required when secret.create=true" .Values.secret.guildId | quote }}
  MCP_AUTH_TOKENS: {{ required "secret.authTokens is required when secret.create=true" .Values.secret.authTokens | quote }}
{{- end }}
