apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "discord-mcp.fullname" . }}-test-healthz"
  labels:
    {{- include "discord-mcp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: healthz
      image: curlimages/curl:8.10.1
      command: ["curl"]
      args:
        - "-sSf"
        - "http://{{ include "discord-mcp.fullname" . }}:{{ .Values.service.port }}/healthz"
